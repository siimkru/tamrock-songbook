# .github/workflows/main.yml
name: Build and Upload ChordPro PDFs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Find files to process
        id: changed-files
        run: |
          # Initialize variable to be empty
          FILES_TO_PROCESS=""

          # Handle a manual run first
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual run: Processing all .cho files."
            FILES_TO_PROCESS=$(find . -maxdepth 1 -name "*.cho" -printf "%f " || true)
          else
            # This is a push event. Check what changed.
            echo "Push event: Checking for changed files."
            CHANGED_FILES=$(git diff --name-only --diff-filter=AMR HEAD^ HEAD)

            # If a config file was changed, rebuild everything.
            if echo "$CHANGED_FILES" | grep -q -E 'guitar\.json|keyboard\.json|lyrics\.json'; then
              echo "Config file change detected! Rebuilding all .cho files."
              FILES_TO_PROCESS=$(find . -maxdepth 1 -name "*.cho" -printf "%f " || true)
            else
              # Otherwise, only process the .cho files that changed.
              echo "No config file change. Processing only changed .cho files."
              FILES_TO_PROCESS=$(echo "$CHANGED_FILES" | grep '\.cho$' | tr '\n' ' ' || true)
            fi
          fi
          
          # Set the output.
          echo "process_list=$FILES_TO_PROCESS" >> $GITHUB_OUTPUT
          echo "Files to process: [${FILES_TO_PROCESS}]"

      - name: Generate and Upload PDFs
        if: steps.changed-files.outputs.process_list
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
        run: |
          for file in ${{ steps.changed-files.outputs.process_list }}; do
            BASENAME=$(basename "$file" .cho)

            echo "--- Processing $BASENAME ---"

            # Generate Guitar PDF
            GUITAR_PDF="${BASENAME}-Kitarr.pdf"
            echo "Generating $GUITAR_PDF..."
            docker run --rm -v "$(pwd):/app" -w /app --user $(id -u):$(id -g) chordpro/chordpro chordpro --config=guitar.json -o "$GUITAR_PDF" "$file"

            # Generate Keyboard PDF
            KEYBOARD_PDF="${BASENAME}-Klaver.pdf"
            echo "Generating $KEYBOARD_PDF..."
            docker run --rm -v "$(pwd):/app" -w /app --user $(id -u):$(id -g) chordpro/chordpro chordpro --config=keyboard.json -o "$KEYBOARD_PDF" "$file"

            LYRICS_PDF="${BASENAME}-Ainult_sonad.pdf"
            echo "Generating $LYRICS_PDF..."
            docker run --rm -v "$(pwd):/app" -w /app --user $(id -u):$(id -g) chordpro/chordpro chordpro --config=lyrics.json -o "$LYRICS_PDF" "$file"

            # Upload all PDFs
            echo "Uploading $GUITAR_PDF to Google Drive..."
            python upload_to_drive.py "$GUITAR_PDF" "$GDRIVE_FOLDER_ID"

            echo "Uploading $KEYBOARD_PDF to Google Drive..."
            python upload_to_drive.py "$KEYBOARD_PDF" "$GDRIVE_FOLDER_ID"

            # --- NEW: Upload Lyrics PDF ---
            echo "Uploading $LYRICS_PDF to Google Drive..."
            python upload_to_drive.py "$LYRICS_PDF" "$GDRIVE_FOLDER_ID"
          done

      - name: Cleanup generated PDFs
        if: always() && steps.changed-files.outputs.process_list
        run: rm -f *.pdf
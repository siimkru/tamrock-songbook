# .github/workflows/main.yml
name: Build and Upload ChordPro PDFs

on:
  push:
    branches:
      - main  # Or 'master', depending on your default branch
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    # This 'if' condition is now smarter. It checks for changed .cho files OR a manual run.
    if: "github.event_name == 'workflow_dispatch' || contains(steps.changed-files.outputs.files_to_process, '.cho')"

    permissions:
      contents: 'read'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Find changed .cho files
        id: changed-files
        run: |
          # If this is a manual run, process all .cho files
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual run detected. Processing all .cho files."
            ALL_CHO_FILES=$(find . -maxdepth 1 -name "*.cho" -printf "%f\n")
            echo "files_to_process=$(echo $ALL_CHO_FILES | tr '\n' ' ')" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Otherwise, find files changed in the last push
          CHANGED_CHO_FILES=$(git diff --name-only --diff-filter=AMR HEAD^ HEAD | grep '\.cho$' || true)
          if [ -z "$CHANGED_CHO_FILES" ]; then
            echo "No .cho files changed. Skipping PDF generation."
            echo "files_to_process=''" >> $GITHUB_OUTPUT
          else
            echo "Found changed files:"
            echo "$CHANGED_CHO_FILES"
            echo "files_to_process=$(echo $CHANGED_CHO_FILES | tr '\n' ' ')" >> $GITHUB_OUTPUT
          fi

      - name: Generate and Upload PDFs
        # This step only runs if the previous step found files to process.
        if: steps.changed-files.outputs.files_to_process != ''
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: |
          for file in ${{ steps.changed-files.outputs.files_to_process }}; do
            BASENAME=$(basename "$file" .cho)
            
            echo "--- Processing $BASENAME ---"

            # Generate Guitar PDF
            GUITAR_PDF="${BASENAME}-Guitar.pdf"
            echo "Generating $GUITAR_PDF..."
            # FIXED: Use the official chordpro/chordpro image and set user permissions
            docker run --rm -v "$(pwd):/app" --user $(id -u):$(id -g) chordpro/chordpro --config=guitar.json -o "$GUITAR_PDF" "$file"
            
            # Generate Keyboard PDF
            KEYBOARD_PDF="${BASENAME}-Keyboard.pdf"
            echo "Generating $KEYBOARD_PDF..."
            # FIXED: Use the official chordpro/chordpro image and set user permissions
            docker run --rm -v "$(pwd):/app" --user $(id -u):$(id -g) chordpro/chordpro --config=keyboard.json -o "$KEYBOARD_PDF" "$file"
            
            # Upload both PDFs
            echo "Uploading $GUITAR_PDF to Google Drive..."
            python upload_to_drive.py "$GUITAR_PDF" "$GDRIVE_FOLDER_ID"
            
            echo "Uploading $KEYBOARD_PDF to Google Drive..."
            python upload_to_drive.py "$KEYBOARD_PDF" "$GDRIVE_FOLDER_ID"
          done

      - name: Cleanup generated PDFs
        if: always() && steps.changed-files.outputs.files_to_process != ''
        run: rm -f *.pdf